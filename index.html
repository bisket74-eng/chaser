<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>

<title>Chaser</title>

<meta name="theme-color" content="#1e4620" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="./manifest.json"/>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
    padding:0; margin:0;
    width:100%; height:100%;
    height:100dvh;
    background:#1e4620;
    overflow:hidden;
    font-family:Arial;
    position:fixed;
}

#map {
    position:fixed;
    inset:0;
    z-index:1;
}

/* HEADER */
#appHeaderContainer{
    position:absolute;
    top:65px;
    left:50%;
    transform:translateX(-50%);
    z-index:10;
    display:flex;
    flex-direction:column;
    align-items:center;
    white-space:nowrap;
}

#appHeader{
    font-family:"Brush Script MT","Comic Sans MS",cursive;
    font-size:75px;
    color:#1e4620;
    font-weight:900;
    text-shadow:3px 3px 0 #e2f0d9;
    pointer-events:none;
}

#riderCounterWidget{
    font-size:15px;
    color:#1e4620;
    font-weight:bold;
    background:#e2f0d9;
    padding:6px 14px;
    border-radius:12px;
}

/* CONTROLS */
#controls{
    position:absolute;
    bottom:20px;
    left:15px;
    z-index:10;
    background:#e2f0d9;
    padding:16px;
    border-radius:18px;
    width:74%;
    max-width:340px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.control-row{
    display:flex;
    gap:8px;
    align-items:center;
}

.control-row input{
    flex:1;
    padding:12px;
    border-radius:8px;
    border:2px solid #2d6a30;
    background:#1e4620;
    color:#fff;
}

/* BUTTONS */
.mic-btn{
    width:44px;height:44px;
    border-radius:50%;
    background:#2d6a30;
    border:none;
    display:flex;
    align-items:center;
    justify-content:center;
}

#startBtn{
    flex:1;
    padding:12px;
    background:#2d6a30;
    color:#fff;
    border:none;
    border-radius:8px;
    font-weight:bold;
}

/* CHAT */
#chatOverlay{
    position:absolute;
    top:0; right:-100%;
    width:100%;
    max-width:340px;
    height:100%;
    background:#fff;
    z-index:20;
    transition:0.3s;
}

#chatOverlay.open{ right:0; }

#chatHeader{
    background:#1e4620;
    color:#fff;
    padding:16px;
    display:flex;
    justify-content:space-between;
}

/* MAP POPUPS */
.leaflet-popup-content-wrapper{
    background:transparent!important;
    box-shadow:none!important;
}

/* ghost marker */
.ghost-marker{
    opacity:0.4;
    filter:grayscale(40%);
}
</style>
</head>

<body>

<div id="appHeaderContainer">
    <div id="appHeader">•Chaser•</div>
    <div id="riderCounterWidget">Buddies Online: 0</div>
</div>

<div id="map"></div>

<div id="controls">
    <div class="control-row">
        <input id="username" placeholder="Enter your name"/>
        <button class="mic-btn" id="usernameMic"></button>
    </div>

    <div class="control-row">
        <input id="destination" placeholder="Destination (optional)"/>
        <button class="mic-btn" id="destinationMic"></button>
    </div>

    <div class="control-row">
        <button id="startBtn">Start Sharing Location</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ─────────────────────────────
   SUPABASE + MAP INIT
───────────────────────────── */
const supabaseClient = supabase.createClient(
  "https://xnwwngqennvwajlhvclj.supabase.co",
  "sb_publishable_jTMgKMLZhXwLPBJyzMueqA_qf5QXVZ8"
);

const map = L.map('map').setView([0,0],2);

L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
  { maxZoom: 19, attribution: '&copy; CartoDB' }
).addTo(map);

/* ─────────────────────────────
   STATE
───────────────────────────── */
const riders = {};
let channel = null;

let isSharing = false;
let activeRoomCode = null;

let lastLat = 0;
let lastLng = 0;

let watchId = null;

let myId = localStorage.getItem("rider_id") ||
  (localStorage.setItem("rider_id","id-"+Math.random().toString(36).slice(2)), localStorage.getItem("rider_id"));

let myColor = localStorage.getItem("rider_chat_color") ||
  (localStorage.setItem("rider_chat_color","#" + Math.floor(Math.random()*16777215).toString(16)), localStorage.getItem("rider_chat_color"));

const sessionToken = "t-" + Math.random().toString(36).slice(2);

const GHOST_MS = 30000;

/* ─────────────────────────────
   ICONS
───────────────────────────── */
const icon = L.icon({
  iconUrl:'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
  iconSize:[25,41],
  iconAnchor:[12,41]
});

const ghostIcon = L.icon({
  iconUrl:'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
  iconSize:[25,41],
  iconAnchor:[12,41],
  className:'ghost-marker'
});

/* ─────────────────────────────
   HELPERS
───────────────────────────── */
const el = id => document.getElementById(id);

const usernameInput = el("username");
const destinationInput = el("destination");

const startBtn = el("startBtn");

const chatOverlay = el("chatOverlay");
const chatMessages = el("chatMessages");
const chatMsgInput = el("chatMsgInput");

const riderCounter = el("riderCounterWidget");

/* ─────────────────────────────
   POPUPS
───────────────────────────── */
function popup(name, dest, ghost, ts) {
  const age = Math.max(0, Math.floor((Date.now()-ts)/1000));

  return `
    <div style="background:#e2f0d9;padding:10px;border-radius:10px;
    border:2px solid #1e4620;text-align:center;">

      <b>${name}</b><br/>
      ${dest ? `→ ${dest}<br/>` : ""}

      <small style="opacity:0.7">
        ${ghost ? "📵 offline " : "🟢 live "}
        (${age}s ago)
      </small>
    </div>
  `;
}

/* ─────────────────────────────
   RIDERS
───────────────────────────── */
function removeRider(name){
  if(riders[name]){
    map.removeLayer(riders[name].marker);
    delete riders[name];
  }
}

function updateRider(user, dest, lat, lng, color){
  const now = Date.now();

  if(riders[user]){
    const r = riders[user];

    r.lastSeen = now;
    r.dest = dest;

    r.marker.setLatLng([lat,lng]);
    r.marker.setPopupContent(popup(user,dest,false,now));

    if(r.isGhost){
      r.isGhost = false;
      r.marker.setIcon(icon);
    }
  } else {
    const marker = L.marker([lat,lng],{icon})
      .addTo(map)
      .bindPopup(popup(user,dest,false,now));

    riders[user] = {
      marker,
      lastSeen: now,
      dest,
      isGhost:false
    };
  }
}

/* ─────────────────────────────
   GHOST CHECK
───────────────────────────── */
setInterval(() => {
  Object.keys(riders).forEach(name => {
    const r = riders[name];
    if(!r) return;

    const age = Date.now() - r.lastSeen;

    if(age > GHOST_MS && !r.isGhost){
      r.isGhost = true;
      r.marker.setIcon(ghostIcon);
      r.marker.setPopupContent(popup(name,r.dest,true,r.lastSeen));
    }
  });

  updateCounter();
}, 10000);

/* ─────────────────────────────
   COUNTER
───────────────────────────── */
function updateCounter(){
  const keys = Object.keys(riders);

  riderCounter.innerText =
    `Buddies Online: ${keys.length}`;
}

/* ─────────────────────────────
   CHANNEL
───────────────────────────── */
function roomName(){
  return activeRoomCode ? `room-${activeRoomCode}` : "room-global";
}

function connect(){
  if(channel) channel.unsubscribe();

  channel = supabaseClient.channel(roomName(),{
    config:{broadcast:{self:false}}
  });

  channel.on("broadcast",{event:"location"},({payload})=>{
    const {user,lat,lng,dest,status} = payload;

    if(status==="offline"){
      removeRider(user);
      return;
    }

    updateRider(user,dest,lat,lng);
    updateCounter();
  });

  channel.subscribe();
}
connect();

/* ─────────────────────────────
   BROADCAST
───────────────────────────── */
function sendLocation(){
  if(!isSharing) return;

  const user = usernameInput.value || "anonymous";

  updateRider(user+" (You)",destinationInput.value,lastLat,lastLng,myColor);

  channel.send({
    type:"broadcast",
    event:"location",
    payload:{
      user,
      lat:lastLat,
      lng:lastLng,
      dest:destinationInput.value,
      status:"online"
    }
  });
}

/* ─────────────────────────────
   START / STOP
───────────────────────────── */
startBtn.onclick = () => {
  if(isSharing){
    isSharing = false;
    navigator.geolocation.clearWatch(watchId);
    return;
  }

  isSharing = true;

  watchId = navigator.geolocation.watchPosition(pos=>{
    lastLat = pos.coords.latitude;
    lastLng = pos.coords.longitude;

    sendLocation();
  });
};

/* ─────────────────────────────
   CHAT (minimal preserved)
───────────────────────────── */
function sendChat(){
  const msg = chatMsgInput.value.trim();
  if(!msg) return;

  channel.send({
    type:"broadcast",
    event:"chat",
    payload:{
      msg,
      user:usernameInput.value
    }
  });

  chatMsgInput.value="";
}

/* ─────────────────────────────
   WAKE LOCK
───────────────────────────── */
let wakeLock=null;

async function requestWakeLock(){
  if("wakeLock" in navigator){
    try{
      wakeLock = await navigator.wakeLock.request("screen");
    }catch(e){}
  }
}

/* ─────────────────────────────
   INPUT HANDLERS
───────────────────────────── */
usernameInput.oninput = () => {
  localStorage.setItem("name",usernameInput.value);
};

/* ─────────────────────────────
   SERVICE WORKER
───────────────────────────── */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./sw.js");
  });
}
</script>
</body>
</html>
