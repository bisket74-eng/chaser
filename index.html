<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Group Ride Tracker</title>
    <link rel="manifest" href="./manifest.json" />
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        html, body {
            padding: 0;
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 85%;
            max-width: 280px;
        }
        input, button {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s ease;
        }
        /* Style for when sharing is active */
        button.sharing-active {
            background-color: #dc3545; /* Red stop button */
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="controls">
        <input type="text" id="username" placeholder="Enter your name" />
        <button id="startBtn">Start Sharing Location</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <script>
        // 1. YOUR SUPABASE CREDENTIALS
        const SUPABASE_URL = "https://xnwwngqennvwajlhvclj.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_jTMgKMLZhXwLPBJyzMueqA_qf5QXVZ8";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 2. INITIALIZE THE MAP
        const map = L.map('map').setView([0, 0], 2);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. APP STATE
        let watchId = null;
        let myUsername = "";
        let isSharing = false; // Tracks whether we are actively tracking or not
        let wakeLock = null;
        const riders = {}; 

        // 4. JOIN THE REAL-TIME CHANNEL
        const channel = supabaseClient.channel('ride-room', {
            config: { broadcast: { ack: false, self: false } }
        });

        channel
            .on('broadcast', { event: 'location-update' }, (payload) => {
                const { user, lat, lng, status } = payload.payload;
                
                // If another rider sends a "disconnected" status, remove their pin
                if (status === 'offline') {
                    if (riders[user]) {
                        map.removeLayer(riders[user]);
                        delete riders[user];
                    }
                } else {
                    updateRiderMarker(user, lat, lng);
                }
            })
            .subscribe();

        // 5. TOGGLE BUTTON & TRACKING LOGIC
        const startBtn = document.getElementById('startBtn');
        const usernameInput = document.getElementById('username');

        startBtn.addEventListener('click', () => {
            if (!isSharing) {
                // START SHARING MODE
                const nameInput = usernameInput.value.trim();
                if (!nameInput) {
                    alert("Please enter a name so others know who you are!");
                    return;
                }
                myUsername = nameInput;
                
                isSharing = true;
                usernameInput.disabled = true;
                startBtn.innerText = "Stop Sharing Location";
                startBtn.classList.add('sharing-active');

                if ("geolocation" in navigator) {
                    watchId = navigator.geolocation.watchPosition(
                        (position) => {
                            const { latitude, longitude } = position.coords;
                            
                            if (Object.keys(riders).length === 0) {
                                map.setView([latitude, longitude], 15);
                            }

                            updateRiderMarker(`${myUsername} (You)`, latitude, longitude);

                            channel.send({
                                type: 'broadcast',
                                event: 'location-update',
                                payload: { user: myUsername, lat: latitude, lng: longitude, status: 'online' }
                            });
                        },
                        (error) => {
                            console.error("Error getting location: ", error);
                            alert("Could not access your location. Ensure location services are enabled.");
                            stopSharingLocation(); // Reset UI if GPS fails
                        },
                        {
                            enableHighAccuracy: true,
                            maximumAge: 0,
                            timeout: 5000
                        }
                    );
                    
                    requestWakeLock();
                } else {
                    alert("Your browser doesn't support geolocation.");
                    stopSharingLocation();
                }
            } else {
                // STOP SHARING MODE
                stopSharingLocation();
            }
        });

        // Helper function to handle cleanly turning off tracking
        function stopSharingLocation() {
            isSharing = false;
            usernameInput.disabled = false;
            startBtn.innerText = "Start Sharing Location";
            startBtn.classList.remove('sharing-active');

            // 1. Kill the active GPS engine
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }

            // 2. Alert the room that you stopped sharing so your marker disappears from their screens
            channel.send({
                type: 'broadcast',
                event: 'location-update',
                payload: { user: myUsername, lat: 0, lng: 0, status: 'offline' }
            });

            // 3. Remove your own local "(You)" map pin
            const myLocalKey = `${myUsername} (You)`;
            if (riders[myLocalKey]) {
                map.removeLayer(riders[myLocalKey]);
                delete riders[myLocalKey];
            }

            // 4. Let the screen sleep again
            releaseWakeLock();
        }

        // 6. UPDATE OR CREATE MARKERS ON THE MAP
        function updateRiderMarker(user, lat, lng) {
            if (riders[user]) {
                riders[user].setLatLng([lat, lng]);
            } else {
                const marker = L.marker([lat, lng]).addTo(map)
                    .bindPopup(user)
                    .openPopup();
                riders[user] = marker;
            }
        }

        // 7. WAKE LOCK MANAGEMENT
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log("Screen Wake Lock active.");
                } catch (err) {
                    console.warn(`Wake Lock failed: ${err.message}`);
                }
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release().then(() => {
                    wakeLock = null;
                    console.log("Screen Wake Lock released.");
                });
            }
        }

        // Register the PWA Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered successfully!', reg))
                    .catch(err => console.error('Service Worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
