<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Group Ride Tracker</title>
    <link rel="manifest" href="./manifest.json" />
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        html, body {
            padding: 0;
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        /* UPDATED: Stretched out wide bar layout with Light Green background */
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: #e2f0d9; /* Light Green */
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 90%; /* Stretched wider across the screen */
            max-width: 400px; /* Generous desktop/tablet cap */
            box-sizing: border-box;
        }
        
        /* Layout row splitting the text field from its standalone mic button */
        .control-row {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        
        /* UPDATED: Inputs are now Dark Green with White Font */
        .control-row input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #2d6a30;
            background-color: #1e4620; /* Dark Green background */
            color: #ffffff; /* White text */
            font-size: 15px;
            box-sizing: border-box;
            font-weight: 500;
        }
        
        /* Light green text styling for the field placeholders */
        .control-row input::placeholder {
            color: #a3cfbb; 
            font-style: italic;
        }
        
        /* UPDATED: Prominent, easy-to-tap standalone microphone buttons */
        .mic-btn {
            width: 45px; /* Significantly larger target area for easy tapping */
            height: 45px;
            background-color: #2d6a30; /* Dark green theme match */
            border: none;
            border-radius: 50%; /* Perfect circle */
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            flex-shrink: 0; /* Prevents button from squeezing on tiny screens */
            transition: background-color 0.2s ease, transform 0.1s ease;
            -webkit-tap-highlight-color: transparent; /* Removes flashing on mobile tap */
        }
        
        .mic-btn active {
            transform: scale(0.92); /* Squishes slightly when pushed down so you feel it */
        }
        
        .mic-btn svg {
            width: 22px;
            height: 22px;
            fill: #ffffff; /* Crisp white icon */
            pointer-events: none; /* CRITICAL FIX: Stops the click passing through to the keyboard */
        }
        
        /* Glow active color when recording */
        .mic-btn.listening {
            background-color: #dc3545 !important; /* Forces bright red status */
            animation: pulse 1.5s infinite;
        }

        #startBtn {
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            background-color: #2d6a30; /* Dark Green match */
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s ease;
            margin-top: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
        #startBtn.sharing-active {
            background-color: #dc3545; /* Dark Red Stop tracking button */
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.6); }
            70% { box-shadow: 0 0 0 10px rgba(220, 53, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="controls">
        <div class="control-row">
            <input type="text" id="username" placeholder="Enter your name" autocomplete="off" />
            <button class="mic-btn" id="usernameMic" type="button" title="Speak name">
                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
            </button>
        </div>
        
        <div class="control-row">
            <input type="text" id="destination" placeholder="Destination (optional)" autocomplete="off" />
            <button class="mic-btn" id="destinationMic" type="button" title="Speak destination">
                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
            </button>
        </div>
        
        <button id="startBtn">Start Sharing Location</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <script>
        // 1. YOUR SUPABASE CREDENTIALS
        const SUPABASE_URL = "https://xnwwngqennvwajlhvclj.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_jTMgKMLZhXwLPBJyzMueqA_qf5QXVZ8";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 2. INITIALIZE THE MAP
        const map = L.map('map').setView([0, 0], 2);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. APP STATE
        let watchId = null;
        let lastLat = 0;
        let lastLng = 0;
        let isSharing = false; 
        let wakeLock = null;
        const riders = {}; 

        // DOM elements
        const startBtn = document.getElementById('startBtn');
        const usernameInput = document.getElementById('username');
        const destinationInput = document.getElementById('destination');
        const usernameMic = document.getElementById('usernameMic');
        const destinationMic = document.getElementById('destinationMic');

        // Check local memory for previously saved name
        const savedName = localStorage.getItem('rider_saved_name');
        if (savedName) {
            usernameInput.value = savedName;
        }

        // 4. JOIN THE REAL-TIME CHANNEL
        const channel = supabaseClient.channel('ride-room', {
            config: { broadcast: { ack: false, self: false } }
        });

        channel
            .on('broadcast', { event: 'location-update' }, (payload) => {
                const { user, dest, lat, lng, status } = payload.payload;
                
                if (status === 'offline') {
                    if (riders[user]) {
                        map.removeLayer(riders[user]);
                        delete riders[user];
                    }
                } else {
                    updateRiderMarker(user, dest, lat, lng);
                }
            })
            .subscribe();

        // 5. TOGGLE BUTTON & TRACKING LOGIC
        startBtn.addEventListener('click', () => {
            if (!isSharing) {
                // START SHARING MODE
                if (!usernameInput.value.trim()) {
                    alert("Please enter a name so others know who you are!");
                    return;
                }
                
                localStorage.setItem('rider_saved_name', usernameInput.value.trim());
                
                isSharing = true;
                startBtn.innerText = "Stop Sharing Location";
                startBtn.classList.add('sharing-active');

                if ("geolocation" in navigator) {
                    watchId = navigator.geolocation.watchPosition(
                        (position) => {
                            lastLat = position.coords.latitude;
                            lastLng = position.coords.longitude;
                            
                            if (Object.keys(riders).length === 0) {
                                map.setView([lastLat, lastLng], 15);
                            }

                            broadcastCurrentState();
                        },
                        (error) => {
                            console.error("Error getting location: ", error);
                            alert("Could not access your location. Ensure location services are enabled.");
                            stopSharingLocation(); 
                        },
                        {
                            enableHighAccuracy: true,
                            maximumAge: 0,
                            timeout: 5000
                        }
                    );
                    
                    requestWakeLock();
                } else {
                    alert("Your browser doesn't support geolocation.");
                    stopSharingLocation();
                }
            } else {
                stopSharingLocation();
            }
        });

        function broadcastCurrentState() {
            if (!isSharing || lastLat === 0 || lastLng === 0) return;

            const currentUser = usernameInput.value.trim() || "Anonymous";
            const currentDest = destinationInput.value.trim();

            updateRiderMarker(`${currentUser} (You)`, currentDest, lastLat, lastLng);

            channel.send({
                type: 'broadcast',
                event: 'location-update',
                payload: { 
                    user: currentUser, 
                    dest: currentDest, 
                    lat: lastLat, 
                    lng: lastLng, 
                    status: 'online' 
                }
            });
        }

        function stopSharingLocation() {
            isSharing = false;
            destinationInput.value = "";
            startBtn.innerText = "Start Sharing Location";
            startBtn.classList.remove('sharing-active');

            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }

            channel.send({
                type: 'broadcast',
                event: 'location-update',
                payload: { user: usernameInput.value.trim() || "Anonymous", dest: '', lat: 0, lng: 0, status: 'offline' }
            });

            Object.keys(riders).forEach(key => {
                if (key.includes('(You)')) {
                    map.removeLayer(riders[key]);
                    delete riders[key];
                }
            });

            lastLat = 0;
            lastLng = 0;
            releaseWakeLock();
        }

        // 6. UPDATE OR CREATE MARKERS ON THE MAP
        function updateRiderMarker(user, dest, lat, lng) {
            let popupContent = `<b>${user}</b>`;
            if (dest) {
                popupContent += `<br><span style="color:#555; font-size:12px;">Heading to: ${dest}</span>`;
            }

            if (riders[user]) {
                riders[user].setLatLng([lat, lng]);
                riders[user].setPopupContent(popupContent);
            } else {
                const marker = L.marker([lat, lng]).addTo(map)
                    .bindPopup(popupContent)
                    .openPopup();
                riders[user] = marker;
            }
        }

        // 7. HANDSFREE VOICE SPEECH DICTATION (UPGRADED WITH KEYBOARD BLOCKER)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (SpeechRecognition) {
            setupVoiceInput(usernameMic, usernameInput);
            setupVoiceInput(destinationMic, destinationInput);
        } else {
            usernameMic.style.display = 'none';
            destinationMic.style.display = 'none';
            console.warn("Speech recognition engine is not supported on this browser device.");
        }

        function setupVoiceInput(buttonEl, inputEl) {
            const recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            // Use 'touchstart' and 'click' overrides to prevent native element focusing mechanics
            const triggerAction = (e) => {
                e.preventDefault(); // STOPS KEYBOARD EVENT
                e.stopPropagation();
                
                if (buttonEl.classList.contains('listening')) {
                    recognition.stop();
                } else {
                    recognition.start();
                }
            };

            buttonEl.addEventListener('click', triggerAction);

            recognition.onstart = () => {
                buttonEl.classList.add('listening');
                inputEl.value = ""; // Clear existing text on fresh dictation push
                inputEl.placeholder = "Listening...";
            };

            recognition.onresult = (event) => {
                const speechToText = event.results[0][0].transcript;
                inputEl.value = speechToText.replace(/[.\s]+$/g, ''); 
                
                if (inputEl.id === 'username') {
                    localStorage.setItem('rider_saved_name', inputEl.value);
                }

                broadcastCurrentState();
            };

            recognition.onerror = (event) => {
                console.error("Speech Recognition Error: ", event.error);
                buttonEl.classList.remove('listening');
                resetPlaceholder(inputEl);
            };

            recognition.onend = () => {
                buttonEl.classList.remove('listening');
                resetPlaceholder(inputEl);
                inputEl.blur(); // Explicitly forces the phone viewport to close input focus boundaries
            };
        }

        // Live typing synchronization 
        usernameInput.addEventListener('input', () => {
            localStorage.setItem('rider_saved_name', usernameInput.value.trim());
            broadcastCurrentState();
        });
        destinationInput.addEventListener('input', broadcastCurrentState);

        function resetPlaceholder(inputEl) {
            if (inputEl.id === 'username') {
                inputEl.placeholder = "Enter your name";
            } else {
                inputEl.placeholder = "Destination (optional)";
            }
        }

        // 8. WAKE LOCK MANAGEMENT
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                } catch (err) {
                    console.warn(`Wake Lock failed: ${err.message}`);
                }
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release().then(() => {
                    wakeLock = null;
                });
            }
        }

        // PWA Service Worker Core
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('PWA Service Worker online!'))
                    .catch(err => console.error('PWA Worker initialization failed:', err));
            });
        }
    </script>
</body>
</html>
