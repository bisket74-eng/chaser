<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Group Ride Tracker</title>
    
    <meta name="theme-color" content="#1e4620" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.json" />
    
    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* [KEEP ALL YOUR EXISTING CSS HERE] */
        html, body { padding: 0; margin: 0; width: 100%; height: 100%; overflow: hidden; font-family: Arial, sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; width: 100%; height: 100%; z-index: 1; }
        #appHeader { position: absolute; top: 25px; left: 50%; transform: translateX(-50%); z-index: 10; font-family: "Brush Script MT", "Comic Sans MS", cursive; font-size: 46px; color: #1e4620; text-shadow: 2px 2px 0px #e2f0d9, -1px -1px 0px #e2f0d9, 1px -1px 0px #e2f0d9, -1px 1px 0px #e2f0d9, 4px 4px 8px rgba(0,0,0,0.3); font-weight: bold; pointer-events: none; white-space: nowrap; }
        #controls { position: absolute; bottom: 20px; left: 15px; z-index: 10; background: #e2f0d9; padding: 16px; border-radius: 18px; box-shadow: 0 8px 25px rgba(0,0,0,0.35); display: flex; flex-direction: column; gap: 12px; width: 74%; max-width: 340px; box-sizing: border-box; }
        .control-row { display: flex; align-items: center; justify-content: space-between; width: 100%; gap: 8px; }
        .control-row input { flex: 1; max-width: 200px; padding: 12px; border-radius: 8px; border: 2px solid #2d6a30; background-color: #1e4620; color: #ffffff; font-size: 16px; box-sizing: border-box; font-weight: 500; }
        .mic-btn { width: 44px; height: 44px; background-color: #2d6a30; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 8px rgba(0,0,0,0.25); flex-shrink: 0; transition: background-color 0.2s ease; }
        #startBtn { padding: 12px; border-radius: 8px; border: none; font-size: 16px; background-color: #2d6a30; color: white; cursor: pointer; font-weight: bold; width: 100%; }
        #riderCounterWidget { font-size: 12px; color: #1e4620; font-weight: bold; text-align: center; margin-top: 5px; }
        #chatToggleBtn { position: absolute; bottom: 54px; right: 15px; z-index: 11; width: 60px; height: 60px; background-color: #1e4620; border: 3px solid #e2f0d9; border-radius: 50%; box-shadow: 0 6px 20px rgba(0,0,0,0.41); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #chatOverlay { position: absolute; top: 0; right: -100%; width: 100%; max-width: 340px; height: 100%; background-color: #ffffff; z-index: 20; box-shadow: -4px 0 20px rgba(0,0,0,0.25); display: flex; flex-direction: column; transition: right 0.3s ease-in-out; }
        #chatOverlay.open { right: 0; }
        #chatHeader { background-color: #1e4620; color: white; padding: 16px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        #chatMessages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background-color: #e2f0d9; }
        .msg-bubble { position: relative; background-color: #ffffff; padding: 12px 28px 12px 12px; border-radius: 12px; max-width: 85%; align-self: flex-start; box-shadow: 0 2px 5px rgba(0,0,0,0.08); }
        .msg-bubble.is-me { background-color: #1e4620; color: white; align-self: flex-end; }
        .msg-delete-btn { position: absolute; top: 6px; right: 8px; background: none; border: none; color: #a3cfbb; font-size: 14px; cursor: pointer; }
        #chatInputArea { padding: 12px; background-color: #ffffff; border-top: 1px solid #ddd; display: flex; gap: 8px; align-items: center; }
        #chatInputArea input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 15px; }
    </style>
</head>
<body>

    <div id="appHeader">Buddy Finder</div>
    <div id="map"></div>
    <div id="controls">
        <div class="control-row">
            <input type="text" id="username" placeholder="Enter your name" autocomplete="off" />
            <button class="mic-btn" id="usernameMic" type="button"><svg viewBox="0 0 24 24" width="20" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg></button>
        </div>
        <button id="startBtn">Start Sharing Location</button>
        <div id="riderCounterWidget">Riders Online: 0</div>
    </div>
    <button id="chatToggleBtn" type="button"><svg viewBox="0 0 24 24" width="28" fill="white"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/></svg></button>
    <div id="chatOverlay">
        <div id="chatHeader"><span>Group Chat</span><button id="closeChatBtn" style="background:none; border:none; color:white; font-size:20px;">✕</button></div>
        <div id="chatMessages"></div>
        <div id="chatInputArea"><input type="text" id="chatMsgInput" placeholder="Type..." /><button class="mic-btn" id="chatMic" type="button"><svg viewBox="0 0 24 24" width="20" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg></button></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const supabaseClient = supabase.createClient("https://xnwwngqennvwajlhvclj.supabase.co", "sb_publishable_jTMgKMLZhXwLPBJyzMueqA_qf5QXVZ8");
        const map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

        let riders = {};
        const channel = supabaseClient.channel('ride-room', { config: { broadcast: { ack: false, self: false } } });
        
        // NEW: Load recent chat history from DB on open, then use Broadcast for live talk
        async function fetchRecentChats() {
            const { data } = await supabaseClient.from('group_chat').select('*').order('created_at', { ascending: false }).limit(10);
            if(data) data.reverse().forEach(m => appendMessage(m.msg_id, m.username, m.message, m.device_id === localStorage.getItem('rider_device_uuid')));
        }

        channel.on('broadcast', { event: 'group-live-chat' }, (payload) => {
            appendMessage(payload.payload.msgId, payload.payload.user, payload.payload.message, false);
        }).subscribe();

        // [INSERT YOUR EXISTING TRACKING LOGIC HERE]

        async function sendGroupMessage() {
            const msg = document.getElementById('chatMsgInput').value.trim();
            if(!msg) return;
            const author = document.getElementById('username').value || "Anonymous";
            const id = 'msg-' + Date.now();
            appendMessage(id, author, msg, true);
            channel.send({ type: 'broadcast', event: 'group-live-chat', payload: { msgId: id, user: author, message: msg } });
            // Save to DB so new users can see it
            await supabaseClient.from('group_chat').insert([{ msg_id: id, username: author, message: msg, device_id: localStorage.getItem('rider_device_uuid') }]);
            document.getElementById('chatMsgInput').value = "";
        }

        function appendMessage(id, user, msg, isMe) {
            const div = document.createElement('div');
            div.className = `msg-bubble ${isMe ? 'is-me' : ''}`;
            div.innerHTML = `<div class="msg-user">${isMe ? 'You' : user}</div><div class="msg-text">${msg}</div>` + (isMe ? `<button class="msg-delete-btn" onclick="this.parentElement.remove()">✕</button>` : '');
            document.getElementById('chatMessages').appendChild(div);
        }

        document.getElementById('chatToggleBtn').addEventListener('click', () => {
            document.getElementById('chatOverlay').classList.add('open');
            fetchRecentChats();
        });
    </script>
</body>
</html>
