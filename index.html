<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Group Ride Tracker</title>
    <link rel="manifest" href="./manifest.json" />
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        html, body {
            padding: 0;
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 85%;
            max-width: 280px;
        }
        
        /* Container layout to embed the microphone icon neatly inside the input wrapper */
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrapper input {
            width: 100%;
            padding: 10px 40px 10px 10px; /* Leave room on the right for the mic */
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            box-sizing: border-box;
        }
        .input-wrapper input::placeholder {
            color: #aaa;
            font-style: italic;
        }
        
        /* Styling for the embedded mic icon buttons */
        .mic-btn {
            position: absolute;
            right: 10px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mic-btn svg {
            width: 20px;
            height: 20px;
            fill: #777; /* Default gray mic color */
            transition: fill 0.2s ease;
        }
        /* Turns the mic icon bright red when active */
        .mic-btn.listening svg {
            fill: #dc3545;
        }

        #startBtn {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s ease;
            margin-top: 5px;
        }
        #startBtn.sharing-active {
            background-color: #dc3545;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="controls">
        <div class="input-wrapper">
            <input type="text" id="username" placeholder="Enter your name" />
            <button class="mic-btn" id="usernameMic" type="button" title="Speak name">
                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
            </button>
        </div>
        
        <div class="input-wrapper">
            <input type="text" id="destination" placeholder="Destination (optional)" />
            <button class="mic-btn" id="destinationMic" type="button" title="Speak destination">
                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
            </button>
        </div>
        
        <button id="startBtn">Start Sharing Location</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <script>
        // 1. YOUR SUPABASE CREDENTIALS
        const SUPABASE_URL = "https://xnwwngqennvwajlhvclj.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_jTMgKMLZhXwLPBJyzMueqA_qf5QXVZ8";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 2. INITIALIZE THE MAP
        const map = L.map('map').setView([0, 0], 2);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. APP STATE
        let watchId = null;
        let myUsername = "";
        let myDestination = "";
        let isSharing = false; 
        let wakeLock = null;
        const riders = {}; 

        // DOM elements
        const startBtn = document.getElementById('startBtn');
        const usernameInput = document.getElementById('username');
        const destinationInput = document.getElementById('destination');
        const usernameMic = document.getElementById('usernameMic');
        const destinationMic = document.getElementById('destinationMic');

        // Check local memory for previously saved name
        const savedName = localStorage.getItem('rider_saved_name');
        if (savedName) {
            usernameInput.value = savedName;
        }

        // 4. JOIN THE REAL-TIME CHANNEL
        const channel = supabaseClient.channel('ride-room', {
            config: { broadcast: { ack: false, self: false } }
        });

        channel
            .on('broadcast', { event: 'location-update' }, (payload) => {
                const { user, dest, lat, lng, status } = payload.payload;
                
                if (status === 'offline') {
                    if (riders[user]) {
                        map.removeLayer(riders[user]);
                        delete riders[user];
                    }
                } else {
                    updateRiderMarker(user, dest, lat, lng);
                }
            })
            .subscribe();

        // 5. TOGGLE BUTTON & TRACKING LOGIC
        startBtn.addEventListener('click', () => {
            if (!isSharing) {
                // START SHARING MODE
                const nameInput = usernameInput.value.trim();
                if (!nameInput) {
                    alert("Please enter a name so others know who you are!");
                    return;
                }
                myUsername = nameInput;
                myDestination = destinationInput.value.trim();
                
                localStorage.setItem('rider_saved_name', myUsername);
                
                isSharing = true;
                usernameInput.disabled = true;
                destinationInput.disabled = true;
                usernameMic.disabled = true;
                destinationMic.disabled = true;
                startBtn.innerText = "Stop Sharing Location";
                startBtn.classList.add('sharing-active');

                if ("geolocation" in navigator) {
                    watchId = navigator.geolocation.watchPosition(
                        (position) => {
                            const { latitude, longitude } = position.coords;
                            
                            if (Object.keys(riders).length === 0) {
                                map.setView([latitude, longitude], 15);
                            }

                            updateRiderMarker(`${myUsername} (You)`, myDestination, latitude, longitude);

                            channel.send({
                                type: 'broadcast',
                                event: 'location-update',
                                payload: { 
                                    user: myUsername, 
                                    dest: myDestination, 
                                    lat: latitude, 
                                    lng: longitude, 
                                    status: 'online' 
                                }
                            });
                        },
                        (error) => {
                            console.error("Error getting location: ", error);
                            alert("Could not access your location. Ensure location services are enabled.");
                            stopSharingLocation(); 
                        },
                        {
                            enableHighAccuracy: true,
                            maximumAge: 0,
                            timeout: 5000
                        }
                    );
                    
                    requestWakeLock();
                } else {
                    alert("Your browser doesn't support geolocation.");
                    stopSharingLocation();
                }
            } else {
                stopSharingLocation();
            }
        });

        function stopSharingLocation() {
            isSharing = false;
            usernameInput.disabled = false;
            destinationInput.disabled = false;
            usernameMic.disabled = false;
            destinationMic.disabled = false;
            
            destinationInput.value = "";
            
            startBtn.innerText = "Start Sharing Location";
            startBtn.classList.remove('sharing-active');

            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }

            channel.send({
                type: 'broadcast',
                event: 'location-update',
                payload: { user: myUsername, dest: '', lat: 0, lng: 0, status: 'offline' }
            });

            const myLocalKey = `${myUsername} (You)`;
            if (riders[myLocalKey]) {
                map.removeLayer(riders[myLocalKey]);
                delete riders[myLocalKey];
            }

            releaseWakeLock();
        }

        // 6. UPDATE OR CREATE MARKERS ON THE MAP
        function updateRiderMarker(user, dest, lat, lng) {
            let popupContent = `<b>${user}</b>`;
            if (dest) {
                popupContent += `<br><span style="color:#555; font-size:12px;">Heading to: ${dest}</span>`;
            }

            if (riders[user]) {
                riders[user].setLatLng([lat, lng]);
                riders[user].setPopupContent(popupContent);
            } else {
                const marker = L.marker([lat, lng]).addTo(map)
                    .bindPopup(popupContent)
                    .openPopup();
                riders[user] = marker;
            }
        }

        // 7. NEW LOGIC: HANDSFREE VOICE SPEECH DICTATION
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (SpeechRecognition) {
            setupVoiceInput(usernameMic, usernameInput);
            setupVoiceInput(destinationMic, destinationInput);
        } else {
            // Hide mic buttons if user is using an old browser that doesn't support speech tracking
            usernameMic.style.display = 'none';
            destinationMic.style.display = 'none';
            console.warn("Speech recognition engine is not supported on this browser device.");
        }

        function setupVoiceInput(buttonEl, inputEl) {
            const recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            buttonEl.addEventListener('click', () => {
                if (buttonEl.classList.contains('listening')) {
                    recognition.stop();
                } else {
                    recognition.start();
                }
            });

            recognition.onstart = () => {
                buttonEl.classList.add('listening');
                inputEl.placeholder = "Listening...";
            };

            recognition.onresult = (event) => {
                const speechToText = event.results[0][0].transcript;
                // Take spoken words and clean out accidental trailing punctuation marks
                inputEl.value = speechToText.replace(/[.\s]+$/g, ''); 
            };

            recognition.onerror = (event) => {
                console.error("Speech Recognition Error: ", event.error);
                buttonEl.classList.remove('listening');
                resetPlaceholder(inputEl);
            };

            recognition.onend = () => {
                buttonEl.classList.remove('listening');
                resetPlaceholder(inputEl);
            };
        }

        function resetPlaceholder(inputEl) {
            if (inputEl.id === 'username') {
                inputEl.placeholder = "Enter your name";
            } else {
                inputEl.placeholder = "Destination (optional)";
            }
        }

        // 8. WAKE LOCK MANAGEMENT
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                } catch (err) {
                    console.warn(`Wake Lock failed: ${err.message}`);
                }
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release().then(() => {
                    wakeLock = null;
                });
            }
        }

        // PWA Service Worker Core
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('PWA Service Worker online!'))
                    .catch(err => console.error('PWA Worker initialization failed:', err));
            });
        }
    </script>
</body>
</html>
