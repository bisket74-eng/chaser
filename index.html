<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Group Ride Tracker</title>
    
    <meta name="theme-color" content="#1e4620" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <link rel="manifest" href="./manifest.json" />
    
    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        html, body {
            padding: 0;
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #appHeader {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-family: "Brush Script MT", "Comic Sans MS", cursive;
            font-size: 46px; 
            color: #1e4620; 
            text-shadow: 2px 2px 0px #e2f0d9, -1px -1px 0px #e2f0d9, 1px -1px 0px #e2f0d9, -1px 1px 0px #e2f0d9, 4px 4px 8px rgba(0,0,0,0.3);
            font-weight: bold;
            letter-spacing: 1px;
            pointer-events: none; 
            white-space: nowrap;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 15px;
            z-index: 10;
            background: #e2f0d9; 
            padding: 16px; 
            border-radius: 18px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.35);
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 74%; 
            max-width: 340px;
            box-sizing: border-box;
        }
        
        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between; 
            width: 100%;
            gap: 8px;
        }
        
        .control-row input {
            flex: 1;
            max-width: 200px; 
            padding: 12px; 
            border-radius: 8px;
            border: 2px solid #2d6a30;
            background-color: #1e4620;
            color: #ffffff;
            font-size: 16px; 
            box-sizing: border-box;
            font-weight: 500;
        }
        
        .control-row input::placeholder {
            color: #a3cfbb; 
            font-style: italic;
        }
        
        .mic-btn {
            width: 44px;
            height: 44px;
            background-color: #2d6a30;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 8px rgba(0,0,0,0.25);
            flex-shrink: 0; 
            transition: background-color 0.2s ease, transform 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }
        
        .mic-btn:active { transform: scale(0.92); }
        .mic-btn svg { width: 20px; height: 20px; fill: #ffffff; pointer-events: none; }
        .mic-btn.listening { background-color: #dc3545 !important; animation: pulse 1.5s infinite; }

        #startBtn {
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 16px; 
            background-color: #2d6a30;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s ease;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
            width: 100%;
            box-sizing: border-box;
        }
        #startBtn.sharing-active { background-color: #dc3545; }

        #chatToggleBtn {
            position: absolute;
            bottom: 54px; 
            right: 15px;
            z-index: 11;
            width: 60px; 
            height: 60px;
            background-color: #1e4620;
            border: 3px solid #e2f0d9;
            border-radius: 50%;
            box-shadow: 0 6px 20px rgba(0,0,0,0.41);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease;
        }
        #chatToggleBtn:active { transform: scale(0.92); }
        #chatToggleBtn svg { width: 28px; height: 28px; fill: #ffffff; }
        
        #chatBadge {
            position: absolute;
            top: -3px;
            right: -3px;
            background-color: #dc3545;
            color: white;
            border-radius: 50%;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: bold;
            display: none;
            border: 2px solid white;
        }

        #chatOverlay {
            position: absolute;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 340px;
            height: 100%;
            background-color: #ffffff;
            z-index: 20;
            box-shadow: -4px 0 20px rgba(0,0,0,0.25);
            display: flex;
            flex-direction: column;
            transition: right 0.3s ease-in-out;
        }
        #chatOverlay.open {
            right: 0;
        }
        
        #chatHeader {
            background-color: #1e4620;
            color: white;
            padding: 16px;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #closeChatBtn {
            background: none;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
        }
        
        #chatMessages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: #e2f0d9; 
            position: relative;
        }
        
        /* FIX: Render a full-size electric lightning bolt that tracks the entire length of the phone screen */
        #chatMessages::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Uses a detailed, sharp lightning path layout colored vibrant electric yellow with enhanced 0.25 opacity */
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23fff200'><path d='M11 21h-1l1.5-6.5h-4c-.55 0-.85-.56-.52-1l6.5-11h1l-1.5 6.5h4c.55 0 .85.56.52 1l-6.5 11z' opacity='0.25'/></svg>");
            background-repeat: no-repeat;
            background-position: center center;
            background-size: 95% 95%; /* Maximized to span across the entire drawer layout borders */
            pointer-events: none; 
            z-index: 0;
        }
        
        .msg-bubble {
            position: relative; 
            background-color: #ffffff; 
            padding: 12px 28px 12px 12px; 
            border-radius: 12px;
            max-width: 85%;
            align-self: flex-start;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
            z-index: 1; /* Floats safely on top of the giant yellow graphic layout */
        }
        .msg-bubble.is-me {
            background-color: #1e4620; 
            color: white;
            align-self: flex-end;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }
        .msg-user { font-size: 12px; font-weight: bold; color: #2d6a30; margin-bottom: 4px; }
        .msg-bubble.is-me .msg-user { color: #a3cfbb; }
        .msg-text { font-size: 14px; word-break: break-word; }
        
        .msg-delete-btn {
            position: absolute;
            top: 6px;
            right: 8px;
            background: none;
            border: none;
            color: #a3cfbb;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            padding: 0;
            margin: 0;
            line-height: 1;
        }
        .msg-delete-btn:hover {
            color: #ffffff;
        }
        
        #chatInputArea {
            padding: 12px;
            background-color: #ffffff;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 8px;
            align-items: center;
            z-index: 2;
        }
        #chatInputArea input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.6); }
            70% { box-shadow: 0 0 0 10px rgba(220, 53, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
        }
    </style>
</head>
<body>

    <div id="appHeader">Buddy Finder</div>

    <div id="map"></div>

    <div id="controls">
        <div class="control-row">
            <input type="text" id="username" placeholder="Enter your name" autocomplete="off" />
            <button class="mic-btn" id="usernameMic" type="button" title="Speak name">
                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
            </button>
        </div>
        
        <div class="control-row">
            <input type="text" id="destination" placeholder="Destination (optional)" autocomplete="off" />
            <button class="mic-btn" id="destinationMic" type="button" title="Speak destination">
                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
            </button>
        </div>
        
        <button id="startBtn">Start Sharing Location</button>
    </div>

    <button id="chatToggleBtn" type="button" title="Open Group Chat">
        <div id="chatBadge">0</div>
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/></svg>
    </button>

    <div id="chatOverlay">
        <div id="chatHeader">
            <span>Group Chat Room</span>
            <button id="closeChatBtn" type="button">✕</button>
        </div>
        <div id="chatMessages"></div>
        <div id="chatInputArea">
            <input type="text" id="chatMsgInput" placeholder="Type a message..." autocomplete="off" />
            <button class="mic-btn" id="chatMic" type="button" title="Speak message">
                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
            </button>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Supabase JS Client -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <script>
        // 1. YOUR SUPABASE CREDENTIALS
        const SUPABASE_URL = "https://xnwwngqennvwajlhvclj.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_jTMgKMLZhXwLPBJyzMueqA_qf5QXVZ8";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 2. INITIALIZE THE MAP
        const map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

        // 3. APP STATE
        let watchId = null;
        let lastLat = 0, lastLng = 0;
        let isSharing = false, isChatOpen = false; 
        let unreadCount = 0;
        let wakeLock = null;
        const riders = {}; 

        // Bind layout nodes
        const startBtn = document.getElementById('startBtn');
        const usernameInput = document.getElementById('username');
        const destinationInput = document.getElementById('destination');
        const usernameMic = document.getElementById('usernameMic');
        const destinationMic = document.getElementById('destinationMic');
        
        const chatToggleBtn = document.getElementById('chatToggleBtn');
        const chatOverlay = document.getElementById('chatOverlay');
        const closeChatBtn = document.getElementById('closeChatBtn');
        const chatMessages = document.getElementById('chatMessages');
        const chatMsgInput = document.getElementById('chatMsgInput');
        const chatMic = document.getElementById('chatMic');
        const chatBadge = document.getElementById('chatBadge');

        const savedName = localStorage.getItem('rider_saved_name');
        if (savedName) usernameInput.value = savedName;

        // 4. JOIN THE REAL-TIME LOCATION CHANNEL
        const channel = supabaseClient.channel('ride-room', {
            config: { broadcast: { ack: false, self: false } }
        });

        channel
            .on('broadcast', { event: 'location-update' }, (payload) => {
                const { user, dest, lat, lng, status } = payload.payload;
                if (status === 'offline') {
                    if (riders[user]) { map.removeLayer(riders[user]); delete riders[user]; }
                } else {
                    updateRiderMarker(user, dest, lat, lng);
                }
            })
            .subscribe();

        // Realtime Postgres database listener loop targeting chat insertion changes
        supabaseClient
            .channel('db-chat')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'group_chat' }, (payload) => {
                const { msg_id, username, message } = payload.new;
                const activeUser = usernameInput.value.trim() || "Anonymous";
                
                if (username !== activeUser) {
                    appendMessage(msg_id, username, message, false);
                    if (!isChatOpen) {
                        unreadCount++;
                        chatBadge.innerText = unreadCount;
                        chatBadge.style.display = 'block';
                    }
                }
            })
            .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'group_chat' }, (payload) => {
                const elements = document.querySelectorAll('.msg-bubble');
                elements.forEach(el => {
                    if (el.dataset.dbId == payload.old.id) {
                        el.remove();
                    }
                });
            })
            .subscribe();

        // 5. TOGGLE BUTTON & TRACKING LOGIC
        startBtn.addEventListener('click', () => {
            if (!isSharing) {
                if (!usernameInput.value.trim()) { alert("Please enter a name so others know who you are!"); return; }
                localStorage.setItem('rider_saved_name', usernameInput.value.trim());
                isSharing = true;
                startBtn.innerText = "Stop Sharing Location";
                startBtn.classList.add('sharing-active');

                if ("geolocation" in navigator) {
                    watchId = navigator.geolocation.watchPosition((position) => {
                        lastLat = position.coords.latitude; lastLng = position.coords.longitude;
                        if (Object.keys(riders).length === 0) map.setView([lastLat, lastLng], 15);
                        broadcastCurrentState();
                    }, () => { stopSharingLocation(); }, { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 });
                    requestWakeLock();
                } else { stopSharingLocation(); }
            } else { stopSharingLocation(); }
        });

        function broadcastCurrentState() {
            if (!isSharing || lastLat === 0 || lastLng === 0) return;
            const currentUser = usernameInput.value.trim() || "Anonymous";
            const currentDest = destinationInput.value.trim();
            updateRiderMarker(`${currentUser} (You)`, currentDest, lastLat, lastLng);
            channel.send({
                type: 'broadcast', event: 'location-update',
                payload: { user: currentUser, dest: currentDest, lat: lastLat, lng: lastLng, status: 'online' }
            });
        }

        function stopSharingLocation() {
            isSharing = false;
            destinationInput.value = "";
            startBtn.innerText = "Start Sharing Location";
            startBtn.classList.remove('sharing-active');
            if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
            channel.send({
                type: 'broadcast', event: 'location-update',
                payload: { user: usernameInput.value.trim() || "Anonymous", dest: '', lat: 0, lng: 0, status: 'offline' }
            });
            Object.keys(riders).forEach(key => { if (key.includes('(You)')) { map.removeLayer(riders[key]); delete riders[key]; } });
            lastLat = 0; lastLng = 0;
            releaseWakeLock();
        }

        function updateRiderMarker(user, dest, lat, lng) {
            let popupContent = `<b>${user}</b>`;
            if (dest) popupContent += `<br><span style="color:#555; font-size:12px;">Heading to: ${dest}</span>`;
            if (riders[user]) {
                riders[user].setLatLng([lat, lng]); riders[user].setPopupContent(popupContent);
            } else {
                riders[user] = L.marker([lat, lng]).addTo(map).bindPopup(popupContent).openPopup();
            }
        }

        // 6. CHAT WINDOW CONTROLLER LOGIC
        chatToggleBtn.addEventListener('click', async () => {
            isChatOpen = true;
            unreadCount = 0;
            chatBadge.style.display = 'none';
            chatOverlay.classList.add('open');
            
            await loadSavedChatHistory();
        });

        closeChatBtn.addEventListener('click', () => {
            isChatOpen = false;
            chatOverlay.classList.remove('open');
        });

        chatMsgInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { sendGroupMessage(); }
        });

        async function loadSavedChatHistory() {
            chatMessages.innerHTML = ""; 
            const activeUser = usernameInput.value.trim() || "Anonymous";

            const { data, error } = await supabaseClient
                .from('group_chat')
                .select('*')
                .order('created_at', { ascending: true })
                .limit(50);

            if (!error && data) {
                data.forEach(msg => {
                    const isMe = msg.username === activeUser;
                    appendMessage(msg.msg_id, msg.username, msg.message, isMe, msg.id);
                });
            }
        }

        async function sendGroupMessage() {
            const rawMessage = chatMsgInput.value.trim();
            if (!rawMessage) return;
            const author = usernameInput.value.trim() || "Anonymous";
            const uniqueMsgId = 'msg-' + Date.now() + '-' + Math.floor(Math.random() * 1000);
            
            chatMsgInput.value = "";

            const { data, error } = await supabaseClient
                .from('group_chat')
                .insert([{ msg_id: uniqueMsgId, username: author, message: rawMessage }])
                .select();

            if (!error && data) {
                appendMessage(uniqueMsgId, author, rawMessage, true, data[0].id);
            } else {
                console.error("Database insert error:", error);
            }
        }

        function appendMessage(id, user, msg, isMe, rowDatabaseId = null) {
            if (document.getElementById(id)) return;

            const wrapper = document.createElement('div');
            wrapper.className = `msg-bubble ${isMe ? 'is-me' : ''}`;
            wrapper.id = id;
            if (rowDatabaseId) wrapper.dataset.dbId = rowDatabaseId;
            
            let htmlContent = `<div class="msg-user">${isMe ? 'You' : user}</div><div class="msg-text">${msg}</div>`;
            
            if (isMe && rowDatabaseId) {
                htmlContent += `<button class="msg-delete-btn" onclick="requestMessageDeletion('${id}', ${rowDatabaseId})">✕</button>`;
            }
            
            wrapper.innerHTML = htmlContent;
            chatMessages.appendChild(wrapper);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function requestMessageDeletion(uiId, dbRowId) {
            const localBubble = document.getElementById(uiId);
            if (localBubble) localBubble.remove();

            await supabaseClient
                .from('group_chat')
                .delete()
                .eq('id', dbRowId);
        }

        // 7. HANDSFREE DICTATION AUDIO CONVERTERS
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            setupVoiceInput(usernameMic, usernameInput);
            setupVoiceInput(destinationMic, destinationInput);
            setupVoiceInput(chatMic, chatMsgInput, true);
        } else {
            usernameMic.style.display = 'none'; destinationMic.style.display = 'none'; chatMic.style.display = 'none';
        }

        function setupVoiceInput(buttonEl, inputEl, autoSubmit = false) {
            const recognition = new SpeechRecognition();
            recognition.continuous = false; recognition.interimResults = false; recognition.lang = 'en-US';

            const triggerAction = (e) => { e.preventDefault(); e.stopPropagation(); if (buttonEl.classList.contains('listening')) { recognition.stop(); } else { recognition.start(); } };
            buttonEl.addEventListener('click', triggerAction);

            recognition.onstart = () => { buttonEl.classList.add('listening'); inputEl.value = ""; inputEl.placeholder = "Listening..."; };
            recognition.onresult = (event) => {
                inputEl.value = event.results[0][0].transcript.replace(/[.\s]+$/g, ''); 
                if (inputEl.id === 'username') localStorage.setItem('rider_saved_name', inputEl.value);
                
                if (autoSubmit) { sendGroupMessage(); } 
                else { broadcastCurrentState(); }
            };
            recognition.onerror = () => { buttonEl.classList.remove('listening'); resetPlaceholder(inputEl); };
            recognition.onend = () => { buttonEl.classList.remove('listening'); resetPlaceholder(inputEl); inputEl.blur(); };
        }

        usernameInput.addEventListener('input', () => { usernameInput.value = usernameInput.value.replace(/[.\s]+$/g, ''); localStorage.setItem('rider_saved_name', usernameInput.value.trim()); broadcastCurrentState(); });
        destinationInput.addEventListener('input', broadcastCurrentState);

        function resetPlaceholder(inputEl) {
            if (inputEl.id === 'username') inputEl.placeholder = "Enter your name";
            else if (inputEl.id === 'destination') inputEl.placeholder = "Destination (optional)";
            else inputEl.placeholder = "Type a message...";
        }

        // 8. WAKE LOCK
        async function requestWakeLock() { if ('wakeLock' in navigator) { try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {} } }
        function releaseWakeLock() { if (wakeLock !== null) { wakeLock.release().then(() => { wakeLock = null; }); } }

        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); }); }
    </script>
</body>
</html>
