                color:#1e4620 !important;
                z-index:15 !important;
                display:flex !important;
                align-items:center !important;
                justify-content:center !important;
                padding:0 !important;
                margin:0 !important;
                box-sizing:border-box !important;
                box-shadow:0 4px 13px rgba(0,0,0,.30) !important;
                cursor:pointer !important;
                touch-action:manipulation !important;
                user-select:none !important;
                -webkit-user-select:none !important;
                -webkit-tap-highlight-color:transparent !important;
                backdrop-filter:blur(3px) !important;
                -webkit-backdrop-filter:blur(3px) !important;
            }

            #chaserMusicBtn.connected {

                background:rgba(30, 70, 32, 0.92) !important;
                box-shadow:0 6px 18px rgba(0,0,0,.35) !important;

                background:rgba(226, 240, 217, 0.30) !important;
            }

            .chaser-music-panel-btn svg {
                width:18px !important;
                height:18px !important;
                display:block !important;
                color:inherit !important;
            }

            #chaserMusicStatus {
                position:fixed !important;
                left:15px !important;
                bottom:260px !important;
                width:74% !important;
                max-width:340px !important;
                z-index:50081 !important;
                display:none !important;
                padding:7px 11px !important;
                border-radius:999px !important;
                background:rgba(226,240,217,.95) !important;
                border:2px solid rgba(30,70,32,.78) !important;
                color:#1e4620 !important;
                font-family:Arial,sans-serif !important;
                font-size:12px !important;
                font-weight:900 !important;
                box-shadow:0 4px 13px rgba(0,0,0,.24) !important;
                text-align:center !important;
                pointer-events:none !important;
                box-sizing:border-box !important;
            }

            #chaserMusicStatus.show {
                display:block !important;
            }

            #chaserSpotifyConnectOverlay {
                position:fixed !important;
                top:0 !important;
                left:0 !important;
                width:100% !important;
                height:100% !important;
                background:rgba(0,0,0,.55) !important;
                z-index:50090 !important;
                display:none !important;
                align-items:center !important;
                justify-content:center !important;
                box-sizing:border-box !important;
                padding:20px !important;
            }

            #chaserSpotifyConnectOverlay.show {
                display:flex !important;
            }

            .chaser-spotify-connect-card {
                background:#e2f0d9 !important;
                border-radius:18px !important;
                padding:20px !important;
                width:100% !important;
                max-width:320px !important;
                box-shadow:0 12px 40px rgba(0,0,0,.4) !important;
                box-sizing:border-box !important;
                font-family:Arial,sans-serif !important;
            }

            .chaser-spotify-connect-card h3 {
                margin:0 0 10px !important;
                color:#1e4620 !important;
                font-size:18px !important;
                text-align:center !important;
            }

            .chaser-spotify-connect-card p {
                margin:0 0 10px !important;
                color:#2d6a30 !important;
                font-size:12.5px !important;
                line-height:1.5 !important;
            }

            .chaser-spotify-connect-card code {
                display:block !important;
                background:rgba(30,70,32,0.08) !important;
                border-radius:8px !important;
                padding:8px !important;
                font-size:11px !important;
                word-break:break-all !important;
                color:#1e4620 !important;
                margin:0 0 10px !important;
            }

            #chaserSpotifyClientIdInput {
                width:100% !important;
                padding:11px !important;
                border-radius:8px !important;
                border:2px solid #2d6a30 !important;
                background:#1e4620 !important;
                color:#fff !important;
                font-size:14px !important;
                box-sizing:border-box !important;
                margin-bottom:10px !important;
            }

            .chaser-spotify-connect-btn-row {
                display:flex !important;
                gap:8px !important;
            }

            .chaser-spotify-connect-btn-row button {
                flex:1 !important;
                padding:11px !important;
                border-radius:8px !important;
                border:none !important;
                font-weight:bold !important;
                font-size:14px !important;
                cursor:pointer !important;
                color:white !important;
            }

            #chaserSpotifyConnectSubmit { background:#2d6a30 !important; }
            #chaserSpotifyConnectClose { background:#6c757d !important; }
            #chaserSpotifyDisconnectBtn {
                background:#dc3545 !important;
                width:100% !important;
                margin-top:8px !important;
                padding:11px !important;
                border-radius:8px !important;
                border:none !important;
                font-weight:bold !important;
                font-size:14px !important;
                cursor:pointer !important;
                color:white !important;
            }
        `;
        document.head.appendChild(style);
    }

    /* ============================== Icons ============================== */

    function musicNoteSvg() {
        return `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 17V5l11-2v12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="6.5" cy="17" r="2.7" fill="currentColor"/><circle cx="17.5" cy="15" r="2.7" fill="currentColor"/></svg>`;
    }

    function prevSvg() {
        return `<svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M6 6h2v12H6zm3.5 6 9-6v12z"/></svg>`;
    }

    function nextSvg() {
        return `<svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M16 6h2v12h-2zM5.5 6l9 6-9 6z"/></svg>`;
    }

    function playIconSvg() {
        return `<svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>`;
    }

    function pauseIconSvg() {
        return `<svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>`;
    }

    function shuffleSvg() {
        return `<svg viewBox="0 0 24 24" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" d="M3 6h3.3c1.2 0 2.3.6 3 1.6l5.4 7.6c.7 1 1.8 1.6 3 1.6H21M17 4l4 3-4 3M3 18h3.3c1.2 0 2.3-.6 3-1.6l1-1.4M14.7 7.6c.7-1 1.8-1.6 3-1.6H21M17 20l4-3-4-3"/></svg>`;
    }

    /* ============================== UI ============================== */

    let musicPanelOpen = false;
    let musicStatusHideTimer = null;
    let musicTapTimer = null;
    const MUSIC_DOUBLE_TAP_MS = 300;

    // Tracks whether Spotify is currently playing, so the play/pause
    // button can actually show the correct icon instead of a static
    // combined glyph that never changed.
    let currentIsPlaying = null;
    let playbackPollTimer = null;

    function updatePlayPauseIcon() {
        const btn = document.querySelector("#chaserMusicPanel .chaser-music-playpause-btn");
        if (!btn) return;
        btn.innerHTML = currentIsPlaying ? pauseIconSvg() : playIconSvg();
    }

    async function refreshPlaybackState() {
        const state = await spotifyFetch("/me/player");
        if (state.ok && state.data) {
            currentIsPlaying = !!state.data.is_playing;
        } else {
            currentIsPlaying = false;
        }
        updatePlayPauseIcon();
    }

    function startPlaybackPolling() {
        stopPlaybackPolling();
        playbackPollTimer = setInterval(refreshPlaybackState, 4000);
    }

    function stopPlaybackPolling() {
        if (playbackPollTimer) {
            clearInterval(playbackPollTimer);
            playbackPollTimer = null;
        }
    }

    function ensureMusicStatus() {
        let el = byId("chaserMusicStatus");
        if (!el) {
            el = document.createElement("div");
            el.id = "chaserMusicStatus";
            document.body.appendChild(el);
        }
        return el;
    }

    function showMusicStatus(text) {
        const el = ensureMusicStatus();
        el.innerText = text;
        el.classList.add("show");

        clearTimeout(musicStatusHideTimer);
        musicStatusHideTimer = setTimeout(() => el.classList.remove("show"), 3200);
    }

    function ensureMusicPanel() {
        let panel = byId("chaserMusicPanel");
        if (panel) return panel;

        panel = document.createElement("div");
        panel.id = "chaserMusicPanel";

        const prevBtn = document.createElement("button");
        prevBtn.type = "button";
        prevBtn.className = "chaser-music-panel-btn";
        prevBtn.innerHTML = prevSvg();
        prevBtn.title = "Previous track";
        prevBtn.addEventListener("click", e => {
            e.preventDefault();
            e.stopPropagation();
            skipPrevious();
        });

        const playPauseBtn = document.createElement("button");
        playPauseBtn.type = "button";
        playPauseBtn.className = "chaser-music-panel-btn chaser-music-playpause-btn";
        playPauseBtn.innerHTML = playIconSvg();
        playPauseBtn.title = "Play / Pause";
        playPauseBtn.addEventListener("click", e => {
            e.preventDefault();
            e.stopPropagation();
            togglePlayPause();
        });

        const nextBtn = document.createElement("button");
        nextBtn.type = "button";
        nextBtn.className = "chaser-music-panel-btn";
        nextBtn.innerHTML = nextSvg();
        nextBtn.title = "Next track";
        nextBtn.addEventListener("click", e => {
            e.preventDefault();
            e.stopPropagation();
            skipNext();
        });

        const shuffleBtn = document.createElement("button");
        shuffleBtn.type = "button";
        shuffleBtn.className = "chaser-music-panel-btn";
        shuffleBtn.innerHTML = shuffleSvg();
        shuffleBtn.title = "Shuffle";
        shuffleBtn.addEventListener("click", e => {
            e.preventDefault();
            e.stopPropagation();
            toggleShuffle();
        });

        panel.appendChild(playPauseBtn);
        panel.appendChild(shuffleBtn);
        panel.appendChild(prevBtn);
        panel.appendChild(nextBtn);
        document.body.appendChild(panel);

        return panel;
    }

    function openMusicPanel() {
        musicPanelOpen = true;
        ensureMusicPanel().classList.add("show");
        positionMusicPanel();
        refreshPlaybackState();
        startPlaybackPolling();
    }

    function closeMusicPanel() {
        musicPanelOpen = false;
        const panel = byId("chaserMusicPanel");
        if (panel) panel.classList.remove("show");
        stopPlaybackPolling();
    }

    function ensureConnectOverlay() {
        let overlay = byId("chaserSpotifyConnectOverlay");
        if (overlay) return overlay;

        overlay = document.createElement("div");
        overlay.id = "chaserSpotifyConnectOverlay";
        overlay.innerHTML = `
            <div class="chaser-spotify-connect-card">
                <h3>Connect Spotify</h3>
                <p id="chaserSpotifyConnectBody"></p>
                <input type="text" id="chaserSpotifyClientIdInput" placeholder="Paste your Client ID" autocomplete="off" />
                <div class="chaser-spotify-connect-btn-row">
                    <button id="chaserSpotifyConnectClose" type="button">Cancel</button>
                    <button id="chaserSpotifyConnectSubmit" type="button">Connect</button>
                </div>
                <button id="chaserSpotifyDisconnectBtn" type="button" style="display:none;">Disconnect Spotify</button>
            </div>
        `;
        document.body.appendChild(overlay);

        overlay.addEventListener("click", e => {
            if (e.target === overlay) overlay.classList.remove("show");
        });

        byId("chaserSpotifyConnectClose").addEventListener("click", () => {
            overlay.classList.remove("show");
        });

        byId("chaserSpotifyConnectSubmit").addEventListener("click", () => {
            const input = byId("chaserSpotifyClientIdInput");
            const value = input ? input.value.trim() : "";
            if (!value) return;
            overlay.classList.remove("show");
            startSpotifyConnect(value);
        });

        byId("chaserSpotifyDisconnectBtn").addEventListener("click", () => {
            disconnectSpotify();
            overlay.classList.remove("show");
            showMusicStatus("Spotify disconnected");
        });

        return overlay;
    }

    function openConnectSettings() {
        const overlay = ensureConnectOverlay();
        const body = byId("chaserSpotifyConnectBody");
        const disconnectBtn = byId("chaserSpotifyDisconnectBtn");
        const input = byId("chaserSpotifyClientIdInput");

        if (isConnected()) {
            body.innerHTML =
                "You're connected. Paste a different Client ID to switch accounts, or disconnect below.";
            disconnectBtn.style.display = "block";
        } else {
            body.innerHTML =
                "Create a free app at <b>developer.spotify.com/dashboard</b>, then set its Redirect URI to exactly:" +
                "<code>" + redirectUri() + "</code>" +
                "Paste the app's Client ID below.";
            disconnectBtn.style.display = "none";
        }

        if (input) input.value = "";
        overlay.classList.add("show");
    }

    function updateButtonMode() {
        const btn = byId("chaserMusicBtn");
        if (!btn) return;
        btn.classList.toggle("connected", isConnected());
    }

    function ensureMusicButton() {
        let btn = byId("chaserMusicBtn");
        if (btn) return btn;

        btn = document.createElement("button");
        btn.id = "chaserMusicBtn";
        btn.type = "button";
        btn.innerHTML = musicNoteSvg();
        btn.title = "Music";
        document.body.appendChild(btn);

        const longPressHandle = (typeof window.chaserAttachLongPress === "function")
            ? window.chaserAttachLongPress(btn, () => {
                closeMusicPanel();
                openConnectSettings();
            })
            : null;

        btn.addEventListener("click", e => {
            e.preventDefault();
            e.stopPropagation();

            if (longPressHandle && longPressHandle.justFired()) {
                longPressHandle.consume();
                return;
            }

            if (!isConnected()) {
                // Nothing to disambiguate here — a tap just opens Spotify,
                // no need to add an artificial delay for anyone who
                // hasn't set up a connection.
                openSpotifyApp();
                return;
            }

            // Connected: single tap toggles the in-app controls panel;
            // double tap (two taps within 300ms) opens the actual
            // Spotify app instead — otherwise there'd be no way left to
            // reach the real app from this button once connected.
            if (musicTapTimer) {
                clearTimeout(musicTapTimer);
                musicTapTimer = null;
                closeMusicPanel();
                openSpotifyApp();
                return;
            }

            musicTapTimer = setTimeout(() => {
                musicTapTimer = null;

                if (musicPanelOpen) closeMusicPanel();
                else openMusicPanel();
            }, MUSIC_DOUBLE_TAP_MS);
        });

        updateButtonMode();
        return btn;
    }

    /* ============================ Positioning ============================ */

    function positionMusicButton() {
        const btn = ensureMusicButton();
        const radius = document.getElementById("radiusToggleBtn");

        if (!radius) return;

        const r = radius.getBoundingClientRect();
        const size = 42;

        // Same general spot the old compass sat in — under the "50 Mi
        // Only" control, slightly right of center. Adjust these two if
        // it ever overlaps anything:
        const rightOffset = 2;
        const topOffset = 9;

        let left = r.right - size - rightOffset;
        let top = r.bottom + topOffset;

        left = Math.max(8, Math.min(window.innerWidth - size - 8, left));
        top = Math.max(72, Math.min(window.innerHeight - size - 8, top));

        btn.style.left = left + "px";
        btn.style.top = top + "px";
    }

    function positionMusicPanel() {
        const panel = byId("chaserMusicPanel");
        const btn = byId("chaserMusicBtn");
        if (!panel || !btn) return;

        const b = btn.getBoundingClientRect();

        // Vertical stack: 4 buttons (34px each) + 3 gaps (8px) + top/bottom
        // padding (8px each) + left/right padding (6px each) for width.
        const panelWidth = 34 + (6 * 2);
        const panelHeight = (34 * 4) + (8 * 3) + (8 * 2);

        let left = b.left + (b.width / 2) - (panelWidth / 2);
        let top = b.bottom + 8;

        left = Math.max(8, Math.min(window.innerWidth - panelWidth - 8, left));
        top = Math.max(8, Math.min(window.innerHeight - panelHeight - 8, top));

        panel.style.left = left + "px";
        panel.style.top = top + "px";
    }

    /* ============================== Init ============================== */

    installStyles();
    ensureMusicButton();
    ensureMusicPanel();
    handleAuthRedirectIfPresent();
    positionMusicButton();

    window.addEventListener("resize", () => {
        positionMusicButton();
        if (musicPanelOpen) positionMusicPanel();
    });

    window.addEventListener("orientationchange", () => {
        setTimeout(() => {
            positionMusicButton();
            if (musicPanelOpen) positionMusicPanel();
        }, 500);
    });

    document.addEventListener("click", e => {
        const panel = byId("chaserMusicPanel");
        const btn = byId("chaserMusicBtn");
        if (!musicPanelOpen || !panel) return;

        if (panel.contains(e.target) || (btn && btn.contains(e.target))) return;

        closeMusicPanel();
    }, true);

    setInterval(() => {
        installStyles();
        positionMusicButton();
        updateButtonMode();
        if (musicPanelOpen) positionMusicPanel();
    }, 1000);
})();
</script>
